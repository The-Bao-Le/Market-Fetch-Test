name: Friday Close Market Snapshot

on:
  workflow_dispatch:
  schedule:
    - cron: "20 16 * * 5"
      timezone: "America/New_York"

permissions:
  contents: write

concurrency:
  group: friday-close-market-snapshot
  cancel-in-progress: true

jobs:
  fetch-market-snapshot:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Friday close market snapshot
        run: |
          python scripts/fetch_market_snapshot.py

      - name: Commit updated market snapshot files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/*.csv data/*.json data/archive/*.csv
          git diff --cached --quiet || git commit -m "Update Friday close market snapshot"
          git push